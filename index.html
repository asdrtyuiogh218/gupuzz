<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>二十四节令鼓鼓谱制作</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 90vw;
            max-width: 620px;
            margin: auto;
            background: white;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 1.4rem;
            margin: 0 0 16px;
        }

        .note-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
        }

        .note {
            flex: 0 0 70px;
            height: 42px;
            border: 1px solid #000;
            border-radius: 5px;
            text-align: center;
            line-height: 42px;
            background-color: #e7f3fe;
            font-size: 14px;
            user-select: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            touch-action: none; /* 阻止触摸滚动，方便拖拽 */
        }

        canvas {
            display: block;
            width: 100%;
            border: 1px solid #000;
            cursor: crosshair;
            border-radius: 4px;
            touch-action: none; /* 阻止触摸缩放滚动 */
            user-select:none;
        }

        #trashbin {
            position: fixed;
            right: 12px;
            bottom: 12px;
            width: 80px;
            height: 80px;
            border: 2px dashed #c33;
            border-radius: 10px;
            background-color: #fee;
            color: #a00;
            font-size: 18px;
            text-align: center;
            line-height: 80px;
            user-select: none;
            transition: background-color 0.3s, border-color 0.3s;
            z-index: 999;
            touch-action: none;
        }
        #trashbin.dragover {
            background-color: #faa;
            border-color: #a00;
            color: #600;
        }

        @media (max-width: 480px) {
            .note {
                flex: 0 0 55px;
                height: 35px;
                font-size: 12px;
                line-height: 35px;
            }
            #trashbin {
                width: 60px;
                height: 60px;
                font-size: 16px;
                line-height: 60px;
            }
            h1 {
                font-size: 1.1rem;
                margin-bottom: 12px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>二十四节令鼓鼓谱制作</h1>
    <div class="note-container">
        <!-- 传统音符 -->
        <div class="note" draggable="true" data-value="4">𝄽</div>
        <div class="note" draggable="true" data-value="2">𝄼</div>
        <div class="note" draggable="true" data-value="1">♩</div>
        <div class="note" draggable="true" data-value="0.5">♪</div>
        <div class="note" draggable="true" data-value="0.25">♫</div>
        <div class="note" draggable="true" data-value="0.125">♬</div>
        <div class="note" draggable="true" data-value="R4">𝄻</div>
        <div class="note" draggable="true" data-value="R2">𝄼</div>
        <div class="note" draggable="true" data-value="R1">𝄽</div>
        <div class="note" draggable="true" data-value="R0.5">𝄾</div>
        <div class="note" draggable="true" data-value="R0.25">𝄿</div>
        <div class="note" draggable="true" data-value="R0.125">𝅀</div>

        <!-- 二十四节令鼓辅助符号 -->
        <div class="note" draggable="true" data-value="z">左</div>
        <div class="note" draggable="true" data-value="y">右</div>
        <div class="note" draggable="true" data-value="d">地</div>
        <div class="note" draggable="true" data-value="g">棒</div>
        <div class="note" draggable="true" data-value="he">he</div>
        <div class="note" draggable="true" data-value="ha">ha</div>
        <div class="note" draggable="true" data-value="ho">ho</div>
        <div class="note" draggable="true" data-value="sa">sa</div>
        <div class="note" draggable="true" data-value="hesa">hesa</div>
    </div>
    <canvas id="scoreCanvas"></canvas>
</div>

<!-- 垃圾桶 -->
<div id="trashbin" title="拖拽音符到这里删除">🗑️ 垃圾桶</div>

<script>
    const notes = document.querySelectorAll('.note');
    const canvas = document.getElementById('scoreCanvas');
    const ctx = canvas.getContext('2d');
    const trashbin = document.getElementById('trashbin');

    // 五线谱行数与尺寸配置
    const staffCount = 3;
    const staffHeight = 120;
    const lineSpacing = 20;

    // 存储已放置音符
    const placedNotes = [];

    // 音符映射
    const noteMapping = {
        '4': '𝄽', '2': '𝄼', '1': '♩', '0.5': '♪', '0.25': '♫', '0.125': '♬',
        'R4': '𝄻', 'R2': '𝄼', 'R1': '𝄽', 'R0.5': '𝄾', 'R0.25': '𝄿', 'R0.125': '𝅀',
        'z': '左', 'y': '右', 'd': '地', 'g': '棒', 'he': 'he', 'ha': 'ha', 'ho': 'ho', 'sa': 'sa', 'hesa': 'hesa'
    };
    const mainNotes = ['4', '2', '1', '0.5', '0.25', '0.125','R4','R2','R1','R0.5','R0.25','R0.125'];
    const auxNotes = ['z', 'y', 'd', 'g', 'he', 'ha', 'ho', 'sa', 'hesa'];

    // 根据容器宽度调整canvas尺寸，canvas绘图尺寸与显示尺寸一致避免缩放偏差
    function resizeCanvas() {
        const containerWidth = document.querySelector('.container').clientWidth;
        canvas.width = containerWidth;      // 物理宽度
        canvas.height = staffCount * staffHeight;
        canvas.style.width = containerWidth + 'px';
        canvas.style.height = canvas.height + 'px';
        redrawAllNotes();
    }

    window.addEventListener('resize', resizeCanvas);

    // 绘制五线谱
    function drawStaffs() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 1;
        ctx.strokeStyle = '#000';

        for(let staffIndex = 0; staffIndex < staffCount; staffIndex++) {
            const topY = staffIndex * staffHeight;
            for(let i = 0; i < 5; i++) {
                const y = topY + (i + 1) * lineSpacing;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            ctx.setLineDash([4, 4]);
            const auxTopY = topY + lineSpacing * 0.5;
            ctx.beginPath();
            ctx.moveTo(0, auxTopY);
            ctx.lineTo(canvas.width, auxTopY);
            ctx.stroke();
            const auxBottomY = topY + lineSpacing * 6;
            ctx.beginPath();
            ctx.moveTo(0, auxBottomY);
            ctx.lineTo(canvas.width, auxBottomY);
            ctx.stroke();
            ctx.setLineDash([]);
        }
    }

    // 重新绘制所有音符
    function redrawAllNotes() {
        drawStaffs();
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#000';

        placedNotes.forEach(note => {
            ctx.font = note.fontSize + 'px serif';
            ctx.fillText(note.symbol, note.x, note.y);
        });
    }

    // 初始化画布大小
    resizeCanvas();

    // 拖拽音符从左侧到画布
    notes.forEach(note => {
        note.addEventListener('dragstart', e => {
            e.dataTransfer.setData('text/plain', note.dataset.value);
        });
    });

    canvas.addEventListener('dragover', e => e.preventDefault());

    canvas.addEventListener('drop', e => {
        e.preventDefault();
        trashbin.classList.remove('dragover');

        const noteValue = e.dataTransfer.getData('text/plain');
        if(!noteValue) return;

        const rect = canvas.getBoundingClientRect();
        const xMouse = e.clientX - rect.left;
        const yMouse = e.clientY - rect.top;

        const staffIndex = Math.floor(yMouse / staffHeight);
        if(staffIndex < 0 || staffIndex >= staffCount) return;
        const staffTopY = staffIndex * staffHeight;

        // 网格对齐
        const gridX = Math.floor(xMouse / 40) * 40 + 20;
        const gridY = Math.floor((yMouse - staffTopY) / 10) * 10 + staffTopY + 5;

        const symbol = noteMapping[noteValue] || noteValue;
        let fontSize = 30;
        if(mainNotes.includes(noteValue)) fontSize = 40;
        else if(auxNotes.includes(noteValue)) fontSize = 20;

        placedNotes.push({symbol, x: gridX, y: gridY, staffIndex, fontSize, noteValue});
        redrawAllNotes();
    });

    // 拖拽垃圾桶
    trashbin.addEventListener('dragover', e => {
        e.preventDefault();
        trashbin.classList.add('dragover');
    });
    trashbin.addEventListener('dragleave', e => {
        trashbin.classList.remove('dragover');
    });

    // 鼠标拖拽画布中音符移动或删除
    let draggingNoteIndex = -1;
    let draggingFromCanvas = false;

    function distance(x1,y1,x2,y2) {
        return Math.hypot(x1 - x2, y1 - y2);
    }

    canvas.addEventListener('mousedown', e => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        for(let i=0; i<placedNotes.length; i++) {
            const n = placedNotes[i];
            if(distance(n.x, n.y, x, y) < 30) {
                draggingNoteIndex = i;
                draggingFromCanvas = true;
                break;
            }
        }
    });

    window.addEventListener('mouseup', e => {
        if(draggingFromCanvas && draggingNoteIndex >= 0){
            const trashRect = trashbin.getBoundingClientRect();
            if(e.clientX >= trashRect.left && e.clientX <= trashRect.right &&
               e.clientY >= trashRect.top && e.clientY <= trashRect.bottom){
                placedNotes.splice(draggingNoteIndex,1);
                redrawAllNotes();
            } else {
                const rect = canvas.getBoundingClientRect();
                let x = e.clientX - rect.left;
                let y = e.clientY - rect.top;
                const staffIndex = Math.floor(y / staffHeight);
                if(staffIndex >=0 && staffIndex < staffCount){
                    const staffTopY = staffIndex * staffHeight;
                    const gridX = Math.floor(x / 40) * 40 + 20;
                    const gridY = Math.floor((y - staffTopY) / 10) * 10 + staffTopY + 5;
                    placedNotes[draggingNoteIndex].x = gridX;
                    placedNotes[draggingNoteIndex].y = gridY;
                    placedNotes[draggingNoteIndex].staffIndex = staffIndex;
                }
                redrawAllNotes();
            }
            draggingNoteIndex = -1;
            draggingFromCanvas = false;
        }
    });

    canvas.addEventListener('mousemove', e => {
        if(draggingFromCanvas && draggingNoteIndex >= 0){
            const rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;
            placedNotes[draggingNoteIndex].x = x;
            placedNotes[draggingNoteIndex].y = y;
            redrawAllNotes();
        }
    });

    // 触摸拖拽支持
    let touchDraggingNoteValue = null;
    let touchDragging = false;

    notes.forEach(note => {
        note.addEventListener('touchstart', e => {
            e.preventDefault();
            touchDraggingNoteValue = note.dataset.value;
            touchDragging = true;
        }, {passive:false});
    });

    canvas.addEventListener('touchmove', e => {
        if(!touchDragging) return;
        e.preventDefault();
    }, {passive:false});

    canvas.addEventListener('touchend', e => {
        if(!touchDragging) return;
        e.preventDefault();

        const touch = e.changedTouches[0];
        const rect = canvas.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;

        const staffIndex = Math.floor(y / staffHeight);
        if(staffIndex < 0 || staffIndex >= staffCount) {
            touchDragging = false;
            touchDraggingNoteValue = null;
            return;
        }
        const staffTopY = staffIndex * staffHeight;

        const gridX = Math.floor(x / 40) * 40 + 20;
        const gridY = Math.floor((y - staffTopY) / 10) * 10 + staffTopY + 5;

        const symbol = noteMapping[touchDraggingNoteValue] || touchDraggingNoteValue;
        let fontSize = 30;
        if(mainNotes.includes(touchDraggingNoteValue)) fontSize = 40;
        else if(auxNotes.includes(touchDraggingNoteValue)) fontSize = 20;

        placedNotes.push({symbol, x: gridX, y: gridY, staffIndex, fontSize, noteValue: touchDraggingNoteValue});
        redrawAllNotes();

        touchDraggingNoteValue = null;
        touchDragging = false;
    }, {passive:false});
</script>
</body>
</html>
